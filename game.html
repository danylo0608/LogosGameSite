<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Деталі гри - LogosGame</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary border-opacity-25 py-3 mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 text-primary" href="index.html">Logos<span class="text-white">Game</span></a>
            <div class="ms-auto">
                <a href="index.html" class="nav-link d-inline-block me-3">Ігри</a>
                <a href="about.html" class="nav-link d-inline-block">Про нас</a>
            </div>
        </div>
    </nav>

    <div class="container py-4" id="gameDetail">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Завантаження...</span>
            </div>
            <p class="mt-2">Завантаження даних...</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
    <script src="js/db_bin.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await loadDatabase();
                const params = new URLSearchParams(window.location.search);
                const gameId = parseInt(params.get('id'));
                if (gameId) {
                    renderGameDetail(gameId);
                } else {
                    window.location.href = 'index.html';
                }
            } catch (error) {
                console.error("Error loading game:", error);
                document.getElementById('gameDetail').innerHTML = `<div class="alert alert-danger">Помилка завантаження даних: ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
