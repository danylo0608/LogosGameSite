<!DOCTYPE html>
<html lang="uk" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LogosGame{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'game:home' %}">LogosGame</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="{% url 'game:home' %}">Головна</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'game:game_list' %}">Всі ігри</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'game:about' %}">Про нас</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4 flex-grow-1">
        {% block content %}{% endblock %}
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container">
            <!-- {% if site_settings.footer_contact_link %}
            <a href="{{ site_settings.footer_contact_link }}" target="_blank" class="btn btn-outline-primary mb-3">
                <i class="bi bi-telegram me-2"></i> {{ site_settings.footer_contact_text }}
            </a>
            {% endif %} -->
            <p class="mb-0 text-muted">&copy; 2026 LogosGame. Всі права захищені.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
