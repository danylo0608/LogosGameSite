<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogosGame - Бібліотека християнських ігор</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary border-opacity-25 py-3 mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 text-primary" href="index.html">Logos<span class="text-white">Game</span></a>
            <div class="ms-auto">
                <a href="index.html" class="nav-link d-inline-block me-3 active">Ігри</a>
                <a href="about.html" class="nav-link d-inline-block">Про нас</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <!-- Кнопка для фільтрів на мобільних -->
            <div class="col-12 d-md-none mb-3">
                <button class="btn btn-primary w-100 py-2 fw-bold" type="button" id="mobileFilterToggle">
                    <i class="bi bi-filter"></i> Налаштувати пошук
                </button>
            </div>

            <!-- Sidebar -->
            <div class="col-md-3 mb-4 d-none d-md-block" id="filterSidebar">
                <div class="sidebar sticky-top" style="top: 20px;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="mb-0 fw-bold">Фільтри</h5>
                        <a href="#" id="resetFilters" class="text-primary text-decoration-none small fw-bold">Скинути</a>
                    </div>
                    
                    <div id="filterContainer">
                        <!-- Filters will be injected here -->
                    </div>

                    <button id="applyFilters" class="btn btn-primary w-100 py-2 fw-bold rounded-pill mt-3">
                        <i class="bi bi-eye me-2"></i> Показати
                    </button>
                </div>
            </div>

            <!-- Content -->
            <div class="col-md-9">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="h3 fw-bold mb-0">Ігри <span id="gameCount" class="badge bg-primary bg-opacity-25 text-primary ms-2 fs-6 fw-normal px-3">0</span></h2>
                </div>
                <div class="row g-4" id="gameList">
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Завантаження...</span>
                        </div>
                        <p class="mt-2 text-muted">Завантаження бази даних...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-5 py-5 border-top border-secondary border-opacity-25">
        <div class="container text-center">
            <p class="text-muted small mb-0">© 2026 LogosGame. Усі права захищені.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
    <script src="js/db_bin.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
